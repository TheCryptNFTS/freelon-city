name: CI

# The acquisition teardown (2026-06-30) flagged the one real CI gap: tsc/lint/
# vitest all pass locally but nothing LOCKED that in, so a regression could ship
# silently. This gate runs the four checks that are green today on every push
# and PR to main. Keep it green; if a step fails, fix the code — don't loosen
# the gate.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
